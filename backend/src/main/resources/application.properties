spring.application.name=smartpark-backend

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/smart_parking?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Secret (Should be in env variables in production)
smartpark.jwt.secret=9a4f4e35456745c31234567890abcdef1234567890abcdef1234567890abcdef
smartpark.jwt.expiration=86400000

# Server port
server.port=${SERVER_PORT:8080}

smartpark.messaging.enabled=false
smartpark.rmi.enabled=false
rmi.registry.port=1099
rmi.service.port=0

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.smartpark=DEBUG
